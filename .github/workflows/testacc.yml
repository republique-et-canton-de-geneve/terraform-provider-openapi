name: Acceptance Tests

on:
  pull_request:
    paths-ignore:
      - 'README.md'
  push:
    paths-ignore:
      - 'README.md'

permissions:
  contents: read

jobs:
  testacc:
    name: Acceptance Tests (Terraform ${{ matrix.terraform }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        terraform:
          - '1.13.*'
          - '1.14.*'
          - '1.15.*'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: testacc/server/requirements.txt

      - name: Install server dependencies
        run: pip install -r testacc/server/requirements.txt

      - name: Migrate and start test server
        working-directory: testacc/server
        run: |
          python manage.py migrate --run-syncdb
          python manage.py runserver 0.0.0.0:8000 &

      - name: Wait for server to be ready
        run: |
          until curl --silent --fail http://localhost:8000/health/; do
            sleep 1
          done

      - run: go mod download

      - name: Run acceptance tests
        run: make testacc
        env:
          OPENAPI_URL: http://localhost:8000
